<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <path id="topArc" d="M 18,150 A 132,132 0 0,1 282,150"/>
    <g id="star">
      <!-- 5-pointed star: outer r=6, inner r=2.4, tip at top -->
      <polygon points="0,-6 1.41,-1.94 5.71,-1.85 2.25,0.74 3.53,4.85 0,2.4 -3.53,4.85 -2.25,0.74 -5.71,-1.85 -1.41,-1.94" fill="#c8a020"/>
    </g>
  </defs>

  <!-- ── SEAL BACKGROUND ── -->
  <circle cx="150" cy="150" r="148" fill="#f0ebe0" stroke="#1a3a6e" stroke-width="4.5"/>
  <circle cx="150" cy="150" r="131" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
  <circle cx="150" cy="150" r="128" fill="none" stroke="#1a3a6e" stroke-width="0.5"/>

  <!-- ── TOP ARC TEXT ── -->
  <text font-family="Oswald, sans-serif" font-size="11.5" font-weight="600"
        fill="#1a3a6e" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="4%">OFFICIAL BUREAU OF GOOD VIBES · EST. TONIGHT</textPath>
  </text>

  <!-- ── BOTTOM DECORATIVE DOTS ── -->
  <circle cx="88"  cy="272" r="2.2" fill="#1a3a6e" opacity="0.45"/>
  <circle cx="102" cy="278" r="2.2" fill="#1a3a6e" opacity="0.45"/>
  <circle cx="118" cy="281" r="2.2" fill="#1a3a6e" opacity="0.45"/>
  <circle cx="134" cy="283" r="2.2" fill="#1a3a6e" opacity="0.45"/>
  <circle cx="150" cy="284" r="3"   fill="#1a3a6e" opacity="0.65"/>
  <circle cx="166" cy="283" r="2.2" fill="#1a3a6e" opacity="0.45"/>
  <circle cx="182" cy="281" r="2.2" fill="#1a3a6e" opacity="0.45"/>
  <circle cx="198" cy="278" r="2.2" fill="#1a3a6e" opacity="0.45"/>
  <circle cx="212" cy="272" r="2.2" fill="#1a3a6e" opacity="0.45"/>

  <!-- ── STARS (9, arced above eagle head) ── -->
  <use href="#star" transform="translate(94,112)"/>
  <use href="#star" transform="translate(107,107)"/>
  <use href="#star" transform="translate(121,104)"/>
  <use href="#star" transform="translate(135,102)"/>
  <use href="#star" transform="translate(150,101) scale(1.18)"/>
  <use href="#star" transform="translate(165,102)"/>
  <use href="#star" transform="translate(179,104)"/>
  <use href="#star" transform="translate(193,107)"/>
  <use href="#star" transform="translate(206,112)"/>

  <!-- ── LEFT WING ── -->
  <path d="M 140,170
           C 115,158 78,136 46,120
           C 58,132 76,147 94,160
           C 74,154 50,152 32,153
           C 56,163 86,170 112,174
           Z"
        fill="#1a3a6e"/>
  <!-- Feather lines on left wing -->
  <path d="M 112,172 C 82,160 56,144 36,128" fill="none" stroke="#faf7f0" stroke-width="0.8" opacity="0.3"/>
  <path d="M 102,175 C 74,166 50,156 33,155" fill="none" stroke="#faf7f0" stroke-width="0.8" opacity="0.3"/>

  <!-- ── RIGHT WING ── -->
  <path d="M 160,170
           C 185,158 222,136 254,120
           C 242,132 224,147 206,160
           C 226,154 250,152 268,153
           C 244,163 214,170 188,174
           Z"
        fill="#1a3a6e"/>
  <!-- Feather lines on right wing -->
  <path d="M 188,172 C 218,160 244,144 264,128" fill="none" stroke="#faf7f0" stroke-width="0.8" opacity="0.3"/>
  <path d="M 198,175 C 226,166 250,156 267,155" fill="none" stroke="#faf7f0" stroke-width="0.8" opacity="0.3"/>

  <!-- ── EAGLE BODY ── -->
  <ellipse cx="150" cy="182" rx="21" ry="26" fill="#1a3a6e"/>

  <!-- Chest shield -->
  <path d="M 139,166 L 161,166 L 161,192 Q 150,200 139,192 Z" fill="#b8251a"/>
  <!-- Shield vertical divider -->
  <line x1="150" y1="166" x2="150" y2="199" stroke="rgba(250,247,240,0.25)" stroke-width="1.2"/>
  <!-- Shield horizontal stripes -->
  <line x1="139" y1="176" x2="161" y2="176" stroke="rgba(250,247,240,0.25)" stroke-width="1.2"/>
  <line x1="139" y1="185" x2="161" y2="185" stroke="rgba(250,247,240,0.25)" stroke-width="1.2"/>
  <!-- White column highlights -->
  <path d="M 139,166 L 147,166 L 147,173 Q 143,176 139,173 Z" fill="rgba(255,255,255,0.18)"/>
  <path d="M 153,166 L 161,166 L 161,173 Q 157,176 153,173 Z" fill="rgba(255,255,255,0.18)"/>

  <!-- ── EAGLE HEAD (white) ── -->
  <circle cx="150" cy="148" r="18" fill="#faf7f0"/>

  <!-- Feather collar line separating white head from dark neck -->
  <path d="M 133,153 Q 140,140 150,138 Q 160,140 167,153"
        fill="none" stroke="#1a3a6e" stroke-width="2.2"/>

  <!-- Dark neck sides blending into body -->
  <path d="M 133,153 Q 130,160 131,166 Q 138,168 150,168" fill="#1a3a6e"/>
  <path d="M 167,153 Q 170,160 169,166 Q 162,168 150,168" fill="#1a3a6e"/>

  <!-- Eye -->
  <circle cx="158" cy="146" r="4"   fill="#1a3a6e"/>
  <circle cx="159.5" cy="144.5" r="1.4" fill="#fff"/>

  <!-- Beak (gold, hooked) -->
  <path d="M 166,144 Q 180,148 175,153 Q 170,156 165,151 Z" fill="#c8a020"/>
  <!-- Lower mandible -->
  <path d="M 166,151 Q 174,153 171,157 Q 168,159 164,155 Z" fill="#c8a020" opacity="0.85"/>

  <!-- ── TAIL FEATHERS ── -->
  <path d="M 140,205 L 143,220 L 150,226 L 157,220 L 160,205"
        fill="#1a3a6e"/>
  <line x1="150" y1="206" x2="150" y2="226" stroke="rgba(250,247,240,0.4)" stroke-width="0.8"/>
  <line x1="144" y1="207" x2="143" y2="219" stroke="rgba(250,247,240,0.4)" stroke-width="0.8"/>
  <line x1="156" y1="207" x2="157" y2="219" stroke="rgba(250,247,240,0.4)" stroke-width="0.8"/>

  <!-- ── LEGS ── -->
  <line x1="140" y1="205" x2="118" y2="224" stroke="#1a3a6e" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="205" x2="182" y2="224" stroke="#1a3a6e" stroke-width="4" stroke-linecap="round"/>

  <!-- Talon grips around glass stems -->
  <path d="M 113,224 Q 116,229 119,224 Q 122,229 125,224" fill="none" stroke="#1a3a6e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 175,224 Q 178,229 181,224 Q 184,229 187,224" fill="none" stroke="#1a3a6e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── LEFT CHAMPAGNE FLUTE ── -->
  <path d="M 106,216 L 122,216 L 118,238 L 110,238 Z"
        fill="rgba(200,160,32,0.14)" stroke="#c8a020" stroke-width="2" stroke-linejoin="round"/>
  <!-- Champagne fill (lower 60%) -->
  <path d="M 107.5,225 L 120.5,225 L 118,238 L 110,238 Z" fill="rgba(200,160,32,0.22)"/>
  <!-- Stem -->
  <line x1="114" y1="238" x2="114" y2="248" stroke="#c8a020" stroke-width="2"/>
  <!-- Base -->
  <line x1="107" y1="248" x2="121" y2="248" stroke="#c8a020" stroke-width="2.5"/>
  <!-- Bubbles -->
  <circle cx="112" cy="219" r="1.5" fill="#c8a020" opacity="0.75"/>
  <circle cx="117" cy="225" r="1.2" fill="#c8a020" opacity="0.55"/>
  <circle cx="111" cy="230" r="1"   fill="#c8a020" opacity="0.45"/>
  <!-- Rim glint -->
  <line x1="106" y1="216" x2="122" y2="216" stroke="#c8a020" stroke-width="1.2" opacity="0.7"/>

  <!-- ── RIGHT CHAMPAGNE FLUTE ── -->
  <path d="M 178,216 L 194,216 L 190,238 L 182,238 Z"
        fill="rgba(200,160,32,0.14)" stroke="#c8a020" stroke-width="2" stroke-linejoin="round"/>
  <path d="M 179.5,225 L 192.5,225 L 190,238 L 182,238 Z" fill="rgba(200,160,32,0.22)"/>
  <line x1="186" y1="238" x2="186" y2="248" stroke="#c8a020" stroke-width="2"/>
  <line x1="179" y1="248" x2="193" y2="248" stroke="#c8a020" stroke-width="2.5"/>
  <circle cx="184" cy="219" r="1.5" fill="#c8a020" opacity="0.75"/>
  <circle cx="189" cy="225" r="1.2" fill="#c8a020" opacity="0.55"/>
  <circle cx="183" cy="230" r="1"   fill="#c8a020" opacity="0.45"/>
  <line x1="178" y1="216" x2="194" y2="216" stroke="#c8a020" stroke-width="1.2" opacity="0.7"/>

  <!-- ── RIBBON BANNER ── -->
  <path d="M 64,254 L 236,254 L 236,270 L 64,270 Z" fill="#1a3a6e"/>
  <!-- Left tail notch -->
  <path d="M 64,254 L 44,262 L 64,270 Z" fill="#0f2a52"/>
  <!-- Right tail notch -->
  <path d="M 236,254 L 256,262 L 236,270 Z" fill="#0f2a52"/>
  <!-- Banner text -->
  <text x="150" y="266" text-anchor="middle"
        font-family="Oswald, sans-serif" font-size="12" font-weight="700"
        fill="#faf7f0" letter-spacing="2.5">IN VIBES WE TRUST</text>

</svg>
